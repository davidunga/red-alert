        />
        <title>התראות פקע"ר - אישי</title>
        <style>
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f4f4f9;
                margin: 0;
                padding: 40px 15px 15px 15px;
                text-align: center;
            }
            .controls {
                background: white;
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
                margin-bottom: 20px;
                display: flex;
                gap: 10px;
                justify-content: center;
                align-items: center;
                flex-wrap: wrap;
            }

            .autocomplete-wrapper {
                position: relative;
                display: inline-block;
            }
            input[type="text"] {
                padding: 10px;
                border: 1px solid #bdc3c7;
                border-radius: 5px;
                font-size: 1em;
                width: 200px;
                box-sizing: border-box;
            }
            .autocomplete-items {
                position: absolute;
                border: 1px solid #d4d4d4;
                border-bottom: none;
                border-top: none;
                z-index: 99;
                top: 100%;
                left: 0;
                right: 0;
                max-height: 160px;
                overflow-y: auto;
                background-color: white;
                box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
                border-radius: 0 0 5px 5px;
                text-align: right;
            }
            .autocomplete-items div {
                padding: 10px;
                cursor: pointer;
                background-color: #fff;
                border-bottom: 1px solid #d4d4d4;
                font-size: 0.9em;
            }
            .autocomplete-items div:hover {
                background-color: #e9e9e9;
            }
            .no-results {
                padding: 10px;
                color: #7f8c8d;
                font-size: 0.9em;
                background-color: #fff;
                border-bottom: 1px solid #d4d4d4;
            }

            button {
                padding: 10px 20px;
                background-color: #3498db;
                color: white;
                border: none;
                border-radius: 5px;
                font-size: 1em;
                cursor: pointer;
                transition: background 0.2s;
            }
            button:hover {
                background-color: #2980b9;
            }
            .grid-container {
                display: grid;
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .card {
                background: white;
                border-radius: 10px;
                padding: 20px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                position: relative;
            }
            .delete-btn {
                position: absolute;
                top: 10px;
                left: 10px;
                background: none;
                color: #e74c3c;
                border: none;
                font-size: 1.5em;
                padding: 0;
                cursor: pointer;
            }
            .delete-btn:hover {
                color: #c0392b;
                background: none;
            }
            .city-name {
                font-size: 1.2em;
                font-weight: bold;
                margin-bottom: 15px;
                color: #2c3e50;
                padding: 0 10px;
            }
            .status {
                padding: 10px;
                border-radius: 5px;
                font-weight: bold;
                color: white;
                font-size: 1.1em;
                transition: background-color 0.5s ease;
            }
            .status.green {
                background-color: #27ae60;
            }
            .status.yellow {
                background-color: #f1c40f;
                color: #2c3e50;
                animation: pulse 1.5s infinite;
            }
            .status.red {
                background-color: #c0392b;
                animation: blink 1s infinite;
            }
            @keyframes blink {
                0% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.6;
                }
                100% {
                    opacity: 1;
                }
            }
            @keyframes pulse {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.02);
                }
                100% {
                    transform: scale(1);
                }
            }
        </style>
    </head>

            ];

            const inputElement = document.getElementById("city-input");
            const autocompleteList =
                document.getElementById("autocomplete-list");
            const uniqueCities = Array.from(new Set(allAvailableCities)).sort();

            function normalizeStr(s) {
                if (!s) return "";
                return s
                    .replace(/[- '""׳״]/g, "")
                    .replace(/יי/g, "י")
                    .replace(/וו/g, "ו");
            }

            function showSuggestions(list) {
                autocompleteList.innerHTML = "";

                if (list.length === 0) {
                    const noResult = document.createElement("div");
                    noResult.className = "no-results";
                    noResult.textContent = "לא נמצא אזור תואם";
                    autocompleteList.appendChild(noResult);
                    return;
                }

                list.forEach((city) => {
                    const item = document.createElement("div");
                    item.textContent = city;

                    item.addEventListener("mousedown", function (e) {
                        e.preventDefault();
                        inputElement.value = city;
                        autocompleteList.innerHTML = "";
                    });
                    item.addEventListener("click", function () {
                        inputElement.value = city;
                        autocompleteList.innerHTML = "";
                    });

                    autocompleteList.appendChild(item);
                });
            }

            inputElement.addEventListener("input", function () {
                const val = this.value.trim();
                if (!val) {
                    showSuggestions(uniqueCities);
                    return;
                }
                const normVal = normalizeStr(val);
                const filtered = uniqueCities.filter((city) =>
                    normalizeStr(city).includes(normVal),
                );
                showSuggestions(filtered);
            });

            inputElement.addEventListener("focus", function () {
                const val = this.value.trim();
                if (!val) {
                    showSuggestions(uniqueCities);
                } else {
                    const normVal = normalizeStr(val);
                    const filtered = uniqueCities.filter((city) =>
                        normalizeStr(city).includes(normVal),
                    );
                    showSuggestions(filtered);
                }
            });

            document.addEventListener("click", function (e) {
                if (!e.target.closest(".autocomplete-wrapper")) {
                    autocompleteList.innerHTML = "";
                }
            });

            // --- זיכרון קשיח וניהול סטטוסים ---
            let userLocations =
                JSON.parse(localStorage.getItem("myAlertCities")) || [];
            // שליפת הסטטוסים מהזיכרון הקבוע של הטלפון כדי לשרוד נעילת מסך
            let locationStates =
                JSON.parse(localStorage.getItem("myAlertStates")) || {};

            const container = document.getElementById("alerts-container");

            function getSafeId(cityName) {
                return cityName.replace(/[^a-zA-Zא-ת0-9]/g, "");
            }

            function renderCards() {
                container.innerHTML = "";

                if (userLocations.length === 0) {
                    container.innerHTML =
                        '<p style="color: #7f8c8d;">לא נבחרו אזורי התרעה. אנא הוסף אזור מהרשימה למעלה.</p>';
                    return;
                }

                const now = Date.now();
                const tenMinutesInMs = 10 * 60 * 1000;

                userLocations.forEach((loc) => {
                    const safeId = getSafeId(loc);

                    if (!locationStates[loc]) {
                        locationStates[loc] = {
                            status: "GREEN",
                            timestamp: now,
                        };
                    }

                    // בדיקת ביטחון: אם האפליקציה עלתה אחרי יותר מ-10 דקות, נאפס לירוק
                    if (locationStates[loc].status !== "GREEN") {
                        if (
                            now - locationStates[loc].timestamp >
                            tenMinutesInMs
                        ) {
                            locationStates[loc].status = "GREEN";
                        }
                    }

                    let sClass =
                        locationStates[loc].status === "RED"
                            ? "red"
                            : locationStates[loc].status === "YELLOW"
                              ? "yellow"
                              : "green";
                    let sText =
                        locationStates[loc].status === "RED"
                            ? "אזעקה פעילה"
                            : locationStates[loc].status === "YELLOW"
                              ? "התרעה מקדימה"
                              : "אין התראה פעילה";

                    container.innerHTML += `
                <div class="card" id="card-${safeId}">
                    <button class="delete-btn" onclick="removeLocation('${loc}')" title="הסר אזור">&times;</button>
                    <div class="city-name">${loc}</div>
                    <div class="status ${sClass}" id="status-${safeId}">${sText}</div>
                </div>
            `;
                });

                // שמירת המצב העדכני
                localStorage.setItem(
                    "myAlertStates",
                    JSON.stringify(locationStates),
                );
                fetchAlerts();
            }

            function addLocation() {
                const newCity = inputElement.value.trim();
                if (newCity === "") return;

                if (!userLocations.includes(newCity)) {
                    if (uniqueCities.includes(newCity)) {
                        userLocations.push(newCity);
                        localStorage.setItem(
                            "myAlertCities",
                            JSON.stringify(userLocations),
                        );
                        renderCards();
                    } else {
                        alert("נא לבחור אזור מתוך הרשימה המוצעת בלבד.");
                    }
                } else {
                    alert("האזור הזה כבר נמצא ברשימה שלך.");
                }
                inputElement.value = "";
                autocompleteList.innerHTML = "";
            }

            function removeLocation(cityToRemove) {
                userLocations = userLocations.filter(
                    (loc) => loc !== cityToRemove,
                );
                localStorage.setItem(
                    "myAlertCities",
                    JSON.stringify(userLocations),
                );
                delete locationStates[cityToRemove];
                localStorage.setItem(
                    "myAlertStates",
                    JSON.stringify(locationStates),
                );
                renderCards();
            }

            // --- משיכת נתונים מפיקוד העורף ---
            const API_BASE_URL =
                "https://oref-proxy.david-unga.workers.dev";

            async function fetchAlerts() {
                if (userLocations.length === 0) return;

                let fetchSuccess = false;
                let activeAlerts = [],
                    alertTitle = "",
                    alertCat = "";
                let isEarlyWarning = false,
                    isAllClear = false;

                try {
                    const bustCacheUrl = `${API_BASE_URL}?v=${Date.now()}`;

                    const response = await fetch(bustCacheUrl, {
                        headers: {
                            "X-Requested-With": "XMLHttpRequest",
                            Referer: "https://www.oref.org.il/",
                        },
                        cache: "no-store",
                    });

                    const text = await response.text();
                    const cleanText = text.replace(/^\uFEFF/, "").trim();

                    if (cleanText === "") {
                        fetchSuccess = true;
                    } else if (
                        cleanText.startsWith("{") ||
                        cleanText.startsWith("[")
                    ) {
                        const data = JSON.parse(cleanText);
                        if (data && data.data) {
                            activeAlerts = data.data;
                            alertTitle = data.title || "";
                            alertCat = String(data.cat || "");
                        }
                        fetchSuccess = true;
                    }
                } catch (error) {
                    console.error("שגיאת תקשורת:", error);
                }

                if (fetchSuccess) {
                    isEarlyWarning =
                        alertTitle.includes("מקדימ") ||
                        alertTitle.includes("צפויות להתקבל") ||
                        alertCat === "10";

                    isAllClear =
                        alertTitle.includes("שגרה") ||
                        alertTitle.includes("שחרור") ||
                        alertTitle.includes("לצאת");
                }

                const now = Date.now();
                const tenMinutesInMs = 10 * 60 * 1000;

                userLocations.forEach((loc) => {
                    const safeId = getSafeId(loc);
                    const statusDiv = document.getElementById(
                        `status-${safeId}`,
                    );
                    if (!statusDiv) return;

                    if (fetchSuccess) {
                        const isAlertActiveInJson = activeAlerts.includes(loc);

                        // תיקון קריטי: שחרור מבוצע *רק* אם האזור שלך ספציפית קיבל הודעת חזרה לשגרה באותו רגע
                        if (isAllClear && isAlertActiveInJson) {
                            locationStates[loc].status = "GREEN";
                            locationStates[loc].timestamp = now;
                        } else if (isAlertActiveInJson && !isAllClear) {
                            locationStates[loc].timestamp = now;

                            if (
                                isEarlyWarning &&
                                locationStates[loc].status !== "RED"
                            ) {
                                locationStates[loc].status = "YELLOW";
                            } else if (!isEarlyWarning) {
                                locationStates[loc].status = "RED";
                            }
                        }
                    }

                    if (locationStates[loc].status !== "GREEN") {
                        const timeSinceAlert =
                            now - locationStates[loc].timestamp;
                        if (timeSinceAlert > tenMinutesInMs) {
                            locationStates[loc].status = "GREEN";
                        }
                    }

                    if (locationStates[loc].status === "YELLOW") {
                        statusDiv.className = "status yellow";
                        statusDiv.innerText = "התרעה מקדימה";
                    } else if (locationStates[loc].status === "RED") {
                        statusDiv.className = "status red";
                        statusDiv.innerText = "אזעקה פעילה";
                    } else {
                        statusDiv.className = "status green";
                        statusDiv.innerText = "אין התראה פעילה";
                    }
                });

                // שמירת המצב לזיכרון הקשיח בכל פעימה (כדי לגבות את הטיימרים)
                localStorage.setItem(
                    "myAlertStates",
                    JSON.stringify(locationStates),
                );

                const updateText = document.getElementById("last-update-time");
                if (fetchSuccess) {
                    updateText.innerText =
                        "עודכן לאחרונה: " + new Date().toLocaleTimeString();
                    updateText.style.color = "#7f8c8d";
                } else {
                    updateText.innerText = "שגיאת תקשורת - מנסה שוב...";
                    updateText.style.color = "#e74c3c";
                }
            }

            renderCards();
            setInterval(fetchAlerts, 3000);
        </script>
